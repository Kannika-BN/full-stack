<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Auth App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">Join us and start your journey today</p>
        
        <div id="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required>
            </div>
            <button type="submit" id="submitBtn">Sign Up</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>
    <script src="script.js"></script>
    <script>
        // Only run registration logic here
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageEl = document.getElementById('message');

            // Email validation (Gmail format as requested)
            if (!email.toLowerCase().endsWith('@gmail.com')) {
                showMessage('Currently only Gmail addresses are supported', 'error');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Registration successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage(data.message || 'Registration failed', 'error');
                }
            } catch (error) {
                showMessage('Server connection error. Is the backend running?', 'error');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
